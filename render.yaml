# Render blueprint for the FastAPI backend (native Python runtime — no Docker
# needed). In the Render dashboard: New > Blueprint, point at this repo.
# Set the secret env vars (marked sync:false) after the first deploy.
services:
  - type: web
    name: uae-real-estate-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Comma-separated list of allowed frontend origins, e.g.
      # https://your-app.vercel.app
      - key: CORS_ORIGINS
        sync: false
      # Optional: enables the address-search / neighborhood features.
      - key: GEOAPIFY_API_KEY
        sync: false
      # Optional: point at a mounted disk with real DLD/KHDA files.
      # Without it the API serves bundled sample data.
      - key: DATA_DIR
        sync: false
